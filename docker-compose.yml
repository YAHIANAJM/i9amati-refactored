
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: i9amati
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d i9amati"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/i9amati
      - JWT_SECRET=test-secret-key
      - JWT_EXPIRES_IN=7d
      - PORT=4000
      - NODE_ENV=test
      - CLIENT_URL=http://localhost:5173
      - CLOUDINARY_CLOUD_NAME=test
      - CLOUDINARY_API_KEY=test
      - CLOUDINARY_API_SECRET=test
      - GROQ_API_KEY=test
      - BETTER_AUTH_SECRET=test-better-auth-secret-key-minimum-32-chars
      - BETTER_AUTH_URL=http://localhost:4000/api/auth
      - BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - VITE_API_URL=http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_test_data:
