# /etc/nginx/sites-available/i9amati
#
# Replace `yourdomain.com` with your actual Hostinger VPS hostname.
# After editing: sudo ln -s /etc/nginx/sites-available/i9amati /etc/nginx/sites-enabled/
#                sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zone ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ── API — https://srv1765015.hstgr.cloud ────────────────────────────────────
server {
    listen 80;
    server_name srv1765015.hstgr.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name srv1765015.hstgr.cloud;

    # SSL — certbot will fill these in:
    # sudo certbot --nginx -d srv1765015.hstgr.cloud
    ssl_certificate     /etc/letsencrypt/live/srv1765015.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1765015.hstgr.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       DENY        always;
    add_header X-Content-Type-Options nosniff    always;
    add_header Referrer-Policy       strict-origin-when-cross-origin always;

    # Max body size for file uploads
    client_max_body_size 20M;

    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Pass cookies through unchanged
        proxy_pass_header  Set-Cookie;
    }
}

# ── Web SPA — https://yourdomain.com ─────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/i9amati/apps/web/dist;
    index index.html;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
