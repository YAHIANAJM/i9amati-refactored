
services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       ${POSTGRES_DB:-i9amati}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5435 (not 5432/5434) to avoid conflict with other projects
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-i9amati}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Adminer (DB GUI — optional, remove if not needed) ────────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    # Port 8181 to avoid conflict with other adminer instances on 8080
    ports:
      - "8181:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── MinIO (file storage) ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9100:9000"   # 9100 on host → 9000 inside container (avoids conflict)
      - "9101:9001"   # 9101 on host → MinIO web console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the i9amati bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/i9amati &&
      printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":[\"*\"]},\"Action\":[\"s3:GetObject\"],\"Resource\":[\"arn:aws:s3:::i9amati/feed/*\",\"arn:aws:s3:::i9amati/profile/*\",\"arn:aws:s3:::i9amati/residences/*\"]}]}' > /tmp/policy.json &&
      mc anonymous set-json /tmp/policy.json local/i9amati"
    restart: "no"

  # ── API (Express + Kysely) ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production          # copy from .env.production.example and fill in values
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-i9amati}
      PORT: 4000
      NODE_ENV: production
      MINIO_ENDPOINT:   minio
      MINIO_PORT:       9000      # internal Docker port — always 9000 inside the network
      MINIO_USE_SSL:    "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET:     i9amati
    # API is NOT exposed on the host — nginx (web container) proxies to it internally.
    # This means no port conflict with the other project's API.
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Web (Vite SPA served by nginx) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty → all /api/* calls are relative, nginx proxies them to api:4000 internally
        VITE_API_URL: ""
    restart: unless-stopped
    # Port 3000 on host → avoids conflict with anything on port 80
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
